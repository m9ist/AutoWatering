; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:megaatmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
lib_extra_dirs = ~/Documents/Arduino/libraries
;monitor_filters = esp8266_exception_decoder
;build_type = debug
build_flags =
	; отладочное логирование обеих прошивок (раньше жило в Communication.h)
	-D DEBUG_LOG
	; SD и дисплей на разных SPI: SdFat должен собрать SoftSpiDriver.
	; Раньше это требовало ручной правки SdFatConfig.h в библиотеке.
	-D SPI_DRIVER_SELECT=2
lib_deps =
	adafruit/Adafruit BusIO@^1.17.2
	adafruit/Adafruit GFX Library@^1.12.1
	paulstoffregen/Time@^1.6.1
	treboada/Ds1302@^1.0.3
	greiman/SdFat@^2.3.1
	cbm80amiga/ST7789 AVR@^1.2.1
	testato/SoftwareWire@^1.6.0
	robtillaart/SHT31@^0.5.2
	robtillaart/SHT31_SWW@^0.2.1
	bblanchon/ArduinoJson@^7.4.2
	nameofthedragon/TA.Arduino.Timer@^1.0.0
	hafidh/FlowSensor@^1.5.2
	robtillaart/ACS712@^0.4.0
build_src_filter = 
	+<**/*>
	; данный фильтр сделан из-за того, что надо сделать define пинов
	-<**/SetDateTime.cpp>
	-<**/GetDateTime.cpp>
	-<**/EspMain.cpp>
	-<**/Graph.h>

[env:esp]
platform = espressif8266
board = esp12e
framework = arduino
upload_protocol = espota
upload_port = 192.168.1.96
upload_speed = 921600
;monitor_filters = esp8266_exception_decoder
;build_type = debug
build_flags =
	-D DEBUG_LOG
build_src_filter =
	+<EspMain.cpp>
	+<SecretHolder.cpp>
	+<Communication.cpp>
	+<Graph.h>
lib_deps =
	bblanchon/ArduinoJson@^7.4.2
	knolleary/PubSubClient@^2.8
	treboada/Ds1302@^1.0.3
	nameofthedragon/TA.Arduino.Timer@^1.0.0

[env:native]
platform = native
build_flags =
	-std=c++14
	-Itest/stubs
	-Isrc
build_src_filter = -<*>
; Запуск тестов: раннер pio test -e native на Windows не работает, но прямой
; локальный g++ (MSYS2) собирает и гоняет тесты нормально (Git Bash):
;   g++ -std=c++14 -Itest/stubs -Isrc -I.pio/libdeps/native/Unity/src \
;     test/test_graph/test_main.cpp .pio/libdeps/native/Unity/src/unity.c \
;     -o "$TEMP/t.exe" && "$TEMP/t.exe"
;   (для остальных наборов заменить test_graph на test_command_parser или
;   test_log_ring)
; test_cmd_handler (issue #17) тянет ArduinoJson (не Arduino-специфичная
; библиотека, собирается голым g++) — добавить в include-путь пакет из любого
; env, где он уже скачан pio, например:
;   g++ -std=c++14 -Itest/stubs -Isrc -I.pio/libdeps/esp/ArduinoJson/src \
;     -I.pio/libdeps/native/Unity/src \
;     test/test_cmd_handler/test_main.cpp .pio/libdeps/native/Unity/src/unity.c \
;     -o "$TEMP/t.exe" && "$TEMP/t.exe"
; Запасной вариант — на серваке deb по ssh:
;   tar cf - src/CommandParser.h src/CmdHandler.h src/Graph.h src/LogRing.h \
;       test .pio/libdeps/native/Unity/src .pio/libdeps/esp/ArduinoJson/src | \
;     ssh deb 'rm -rf /tmp/aw_tests && mkdir -p /tmp/aw_tests && cd /tmp/aw_tests && \
;       tar xf - && \
;       g++ -std=c++14 -Itest/stubs -Isrc -I.pio/libdeps/native/Unity/src \
;         test/test_graph/test_main.cpp .pio/libdeps/native/Unity/src/unity.c \
;         -o t && ./t && \
;       g++ -std=c++14 -Itest/stubs -Isrc -I.pio/libdeps/native/Unity/src \
;         test/test_command_parser/test_main.cpp .pio/libdeps/native/Unity/src/unity.c \
;         -o t2 && ./t2 && \
;       g++ -std=c++14 -Itest/stubs -Isrc -I.pio/libdeps/native/Unity/src \
;         test/test_log_ring/test_main.cpp .pio/libdeps/native/Unity/src/unity.c \
;         -o t3 && ./t3 && \
;       g++ -std=c++14 -Itest/stubs -Isrc -I.pio/libdeps/esp/ArduinoJson/src \
;         -I.pio/libdeps/native/Unity/src \
;         test/test_cmd_handler/test_main.cpp .pio/libdeps/native/Unity/src/unity.c \
;         -o t4 && ./t4'
